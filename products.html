<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ürünler — Nota Müzik Market</title>
<meta name="description" content="Tüm müzik enstrümanları: gitar, klavye & piyano, davul, yaylı çalgılar ve aksesuarlar. Ara, kategoriye göre filtrele." />
<meta name="theme-color" content="#fafafa" />
<link rel="canonical" href="https://www.notamuzikmarket.com/products.html" />
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<link rel="stylesheet" href="styles.css?v=37" />
<link rel="stylesheet" href="auth.css?v=28" />
<link rel="stylesheet" href="shop.css?v=30" />
<link rel="stylesheet" href="products.css?v=2" />
</head>
<body class="shop-page">

<header class="site-header" id="siteHeader">
  <a href="index.html" class="logo" aria-label="Nota Müzik Market ana sayfa">
    <span class="logo-mark" aria-hidden="true">♪</span>
    <span class="logo-text">NOTA MÜZİK MARKET<sup>®</sup></span>
  </a>
  <div class="header-right">
    <div class="auth-slot" id="authSlot" data-state="loading">
      <button class="auth-link" data-when="out" data-tab="login" type="button">Giriş Yap</button>
      <button class="auth-link auth-link-primary" data-when="out" data-tab="register" type="button">Kayıt Ol</button>
      <a href="account.html" class="account-link" data-when="in" hidden>Hesabım</a>
      <button type="button" id="logoutBtn" class="logout-link" data-when="in" hidden>Çıkış</button>
    </div>
    <a href="account.html?tab=wishlist" class="fav-link" aria-label="Favorilerim" title="Favorilerim">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>
      </svg>
    </a>
    <a href="cart.html" class="cart-btn" aria-label="Sepet">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 3h2l2.4 12.4a2 2 0 0 0 2 1.6h7.7a2 2 0 0 0 2-1.6L21 7H6"/>
        <circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/>
      </svg>
      <span class="cart-badge" id="cartBadge" aria-live="polite">0</span>
    </a>
  </div>
</header>

<main class="catalog-shell">
  <h1 class="catalog-title">Ürünler</h1>

  <form class="catalog-search" id="catalogSearch" role="search" autocomplete="off">
    <svg class="catalog-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="search" id="searchInput" inputmode="search" placeholder="Ürün ara… (ör. gitar, davul, keman)" aria-label="Ürün ara" />
    <button type="button" class="catalog-search-clear" id="searchClear" aria-label="Temizle" hidden>×</button>
  </form>

  <div class="catalog-cats" id="catalogCats" role="group" aria-label="Kategoriler"></div>

  <p class="catalog-count" id="catalogCount" aria-live="polite"></p>
  <div class="catalog-grid" id="catalogGrid"><p class="shop-loading">Yükleniyor…</p></div>
</main>

<div class="nm-toast" id="nmToast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=37"></script>
<script src="api.js?v=39"></script>
<script src="cart-store.js?v=33"></script>
<script src="auth-modal.js?v=30" defer></script>
<script src="header-auth.js?v=30" defer></script>
<script src="products.js?v=2" defer></script>

</body>
</html>
