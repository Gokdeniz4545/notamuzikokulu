<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Yönetim — Nota Müzik Market</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#fafafa" />
<link rel="icon" type="image/png" href="images/logo-icon.png" />
<link rel="apple-touch-icon" href="images/logo-icon.png" />
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<link rel="stylesheet" href="styles.css?v=42" />
<link rel="stylesheet" href="auth.css?v=28" />
<link rel="stylesheet" href="account.css?v=30" />
<link rel="stylesheet" href="admin.css?v=39" />
</head>
<body class="admin-page">

<header class="site-header" id="siteHeader">
  <a href="index.html" class="logo" aria-label="Nota Müzik Market ana sayfa">
    <img class="logo-img" src="images/logo.png" alt="Nota Müzik Market" style="height:40px;width:auto;display:block" />
  </a>
  <div class="header-right">
    <span class="admin-badge" id="adminBadge" hidden>YÖNETİM</span>
    <div class="auth-slot" id="authSlot" data-state="loading">
      <button class="auth-link" data-when="out" data-tab="login" type="button">Giriş Yap</button>
      <a href="account.html" class="account-link" data-when="in" hidden>Hesabım</a>
      <button type="button" id="logoutBtn" class="logout-link" data-when="in" hidden>Çıkış</button>
    </div>
  </div>
</header>

<main class="admin-shell" id="adminShell" hidden>
  <aside class="account-nav admin-nav">
    <p class="account-greeting">Yönetim Paneli</p>
    <nav class="account-tabs" role="tablist" aria-label="Yönetim bölümleri">
      <button type="button" class="account-tab" role="tab" data-tab="dashboard">Özet</button>
      <button type="button" class="account-tab" role="tab" data-tab="orders">Siparişler</button>
      <button type="button" class="account-tab" role="tab" data-tab="products">Ürünler</button>
      <button type="button" class="account-tab" role="tab" data-tab="categories">Kategoriler</button>
    </nav>
  </aside>
  <section class="account-panel admin-panel" id="adminContent" aria-live="polite"></section>
</main>

<div class="account-gate" id="adminGate">
  <p class="account-gate-text" id="adminGateText">Yükleniyor…</p>
  <button type="button" class="auth-btn-primary" id="adminGateLogin" hidden data-auth-open="login">Giriş Yap</button>
  <a href="index.html" class="account-gate-home">Ana sayfaya dön</a>
</div>

<div class="nm-toast" id="nmToast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
<script src="supabase-client.js?v=44"></script>
<script src="api.js?v=43"></script>
<script src="auth-modal.js?v=31" defer></script>
<script src="header-auth.js?v=30" defer></script>
<script src="admin.js?v=42" defer></script>

</body>
</html>
